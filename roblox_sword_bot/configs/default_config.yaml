# Configuration for Roblox Sword Fight Bot
# Hybrid architecture: GameDetector + CNN spatial awareness
# Resolution: 1536x888 fullscreen

# Hardware settings 
hardware:
  use_gpu: false  # Set to true if you have dedicated GPU
  device: "cpu"   # or "cuda" if GPU available
  num_workers: 4  # Data loading workers
  precision: "fp32"  # Use "fp16" for 2x speedup on supported hardware

# Screen capture settings
capture:
  resolution: [1536, 888]  # Capture the FULL screen (no tiny crops)
  fps: 30  # Target capture FPS
  region: null  # null = centers the resolution box on screen (which is now full screen)
  # For 1536x888 fullscreen, centered 800x600 = {left: 368, top: 144}
  screen_resolution: [1536, 888]  # Your actual Roblox fullscreen resolution

# Feature extraction settings
features:
  use_color_detection: true
  use_geometric_anchoring: true
  use_ocr: true  # ENABLED — needed for kill log tracking
  feature_history_length: 10  # Number of past frames to consider
  cnn_resolution: [80, 60]  # Width x Height for CNN input frame (grayscale)
  
  # Health bar detection (HSV ranges)
  health_bar:
    green_lower: [35, 80, 80]
    green_upper: [85, 255, 255]
    red_lower_1: [0, 80, 80]
    red_upper_1: [10, 255, 255]
    red_lower_2: [170, 80, 80]
    red_upper_2: [180, 255, 255]
    min_bar_width: 20
    max_bar_width: 150
    max_bar_height: 12
    min_aspect_ratio: 3.0
  
  # White text confirmation for geometric anchoring
  text_confirmation:
    white_threshold: 200  # Min value in all RGB channels to count as "white"
    min_white_ratio: 0.03  # At least 3% white pixels in text ROI
  
  # Kill log detection (OCR on bottom-right of FULL SCREEN)
  kill_log:
    enabled: true
    player_name: "sagupaam6"  # Your Roblox username for kill detection
    # Absolute screen coordinates for the kill log ROI (bottom-right corner)
    # For 1920x1200 screen (physical coordinates scanned by mss):
    screen_region: [1300, 1080, 620, 60]  # [left, top, width, height]
    confidence_threshold: 0.4
    scan_interval_frames: 45  # OCR every 45 frames (less CPU usage)
    dedup_timeout_seconds: 4.0  # Ignore duplicate kill log lines within this window

  # Player death detection (health bar in top-right corner)
  death_detection:
    enabled: true
    # Absolute screen coordinates for the health bar ROI (top-right corner)
    # On 1920x1200: exact location of the health bar rounded rect
    screen_region: [1698, 20, 222, 45]  # [left, top, width, height]
    template_path: "checkpoints/death_bar_template.png"
    match_threshold: 0.80  # Correlation threshold (dead if match > 0.80)

  # Enemy detection via green HP text nametags
  enemy_detection:
    enabled: true
    # HSV range for the bright green "100 HP" text above enemy heads
    hp_text_hsv_lower: [35, 80, 150]
    hp_text_hsv_upper: [85, 255, 255]
    # Contour filtering
    min_contour_area: 15       # Minimum pixel area for a valid HP text blob
    max_contour_area: 8000     # Maximum pixel area (filter out green floor tiles)
    min_aspect_ratio: 1.2      # HP text is wider than tall
    max_aspect_ratio: 20.0     # Not absurdly wide (noise)
    # Spatial filtering (relative to 800x600 capture frame)
    exclude_bottom_ratio: 0.35  # Ignore bottom 35% (green floor tiles)
    exclude_top_ratio: 0.05     # Ignore top 5% (safe zone banner)
    # Clustering: merge nearby green blobs into a single enemy
    cluster_distance_px: 50     # Max pixel distance to merge blobs

  # Safe zone detection (static ROI at top-center)
  safe_zone:
    roi: [150, 5, 500, 45]  # [x, y, width, height] relative to 800x600 capture
    banner_red_lower_1: [0, 120, 150]
    banner_red_upper_1: [10, 255, 255]
    banner_red_lower_2: [170, 120, 150]
    banner_red_upper_2: [180, 255, 255]
    banner_yellow_lower: [15, 120, 150]
    banner_yellow_upper: [35, 255, 255]
    detection_threshold: 0.08  # Min banner color ratio to confirm safe zone

# Model architecture
model:
  type: "hybrid"  # "mlp" or "hybrid"
  hidden_layers: [128, 64]  # MLP head layer sizes
  dropout: 0.1
  activation: "relu"
  cnn_output_dim: 32  # Spatial CNN output features
  max_parameters: 500000  # Keep under 500K for Iris Xe

# Behavior Cloning training
behavior_cloning:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"
  loss_function: "cross_entropy"
  early_stopping_patience: 10
  validation_split: 0.2

# Reinforcement Learning training
reinforcement_learning:
  algorithm: "PPO"  # PPO or DQN (PPO recommended for continuous actions)
  episodes: 1000
  steps_per_episode: 256
  gamma: 0.99  # Discount factor
  learning_rate: 0.00003
  clip_range: 0.2
  entropy_coef: 0.01
  
# Rewards configuration
rewards:
  kill: 10.0           # Successfully killed another player
  death: -10.0         # Got killed by another player
  safe_zone_penalty: -0.05  # Per-step penalty for camping in safe zone (only after first leave)
  safe_zone_leave: 2.0       # One-time reward for leaving safe zone after spawn/respawn
  safe_zone_reenter: -2.0    # One-time penalty for cowardly re-entry (not after death)
  health_drop_multiplier: -1.0 # Penalty multiplier for taking damage (e.g. 10% hit = -0.1)
  trigger_bonus: 0.05        # Bonus for swinging when enemy is in crosshair
  trigger_penalty: -0.01     # Penalty for spam-clicking air
  idle_penalty: -0.01       # Per-step penalty for doing nothing

# Action space
actions:
  keyboard_keys: ["W", "A", "S", "D", "SPACE"]
  mouse_buttons: ["left", "right"]
  mouse_sensitivity: 0.5  # Lower = smoother movements
  action_repeat: 4  # Repeat action for N frames (crucial for finishing sword swings)
  
# Human-like behavior
humanization:
  enable_reaction_delay: false
  min_reaction_time_ms: 150  # Minimum human reaction time
  max_reaction_time_ms: 350  # Maximum human reaction time
  jitter_std: 0.05  # Random noise added to movements
  action_randomness: 0.02  # Small random variations in timing

# Inference settings
inference:
  fps_limit: 60  # Match game FPS
  confidence_threshold: 0.0  # LOWERED TO 0.0 - ALWAYS take the most likely action
  smoothing_window: 3  # Frame averaging for smoother movements
  safety_mode: true  # Enable anti-detection features

# Data collection
data_collection:
  save_directory: "./data/recordings"
  session_duration_seconds: 1800  # 30 minutes per session
  save_format: "npz"  # numpy compressed format
  compress: true

# Logging and monitoring
logging:
  level: "INFO"
  save_logs: true
  log_directory: "./logs"
  tensorboard: true
  checkpoint_frequency: 5  # Save model every N epochs

# Paths
paths:
  data_dir: "./data"
  model_dir: "./checkpoints"
  config_dir: "./configs"
  log_dir: "./logs"
