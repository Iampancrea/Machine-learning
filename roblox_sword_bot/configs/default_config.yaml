# Configuration for Roblox Sword Fight Bot
# Hybrid architecture: GameDetector + CNN spatial awareness
# NO OCR — CNN branch handles UI/spatial pattern recognition

# Hardware settings
hardware:
  use_gpu: false  # Set to true if you have dedicated GPU
  device: "cpu"   # or "cuda" if GPU available
  num_workers: 4  # Data loading workers
  precision: "fp32"  # Use "fp16" for 2x speedup on supported hardware

# Screen capture settings
capture:
  resolution: [800, 600]  # Strict bounding box captured at OS level (no resize)
  fps: 30  # Target capture FPS
  region: null  # null = centered 800x600 box, or [left, top, width, height]

# Feature extraction settings
features:
  use_color_detection: true
  use_geometric_anchoring: true
  use_ocr: false  # DISABLED — CNN branch handles spatial/UI awareness
  feature_history_length: 10  # Number of past frames to consider
  cnn_resolution: [80, 60]  # Width x Height for CNN input frame (grayscale)
  
  # Health bar detection (HSV ranges)
  health_bar:
    green_lower: [35, 80, 80]
    green_upper: [85, 255, 255]
    red_lower_1: [0, 80, 80]
    red_upper_1: [10, 255, 255]
    red_lower_2: [170, 80, 80]
    red_upper_2: [180, 255, 255]
    min_bar_width: 20
    max_bar_width: 150
    max_bar_height: 12
    min_aspect_ratio: 3.0
  
  # White text confirmation for geometric anchoring
  text_confirmation:
    white_threshold: 200  # Min value in all RGB channels to count as "white"
    min_white_ratio: 0.03  # At least 3% white pixels in text ROI
  
  # Safe zone detection (static ROI at top-center)
  kill_log:
    enabled: true
    box: [280, 20, 400, 150]  # [x, y, w, h] roughly top right
    confidence_threshold: 0.6
    player_name: "sagupaam6"  # Your Roblox username for kill detection
  safe_zone:
    roi: [150, 5, 500, 45]  # [x, y, width, height] relative to 800x600 capture
    banner_red_lower_1: [0, 120, 150]
    banner_red_upper_1: [10, 255, 255]
    banner_red_lower_2: [170, 120, 150]
    banner_red_upper_2: [180, 255, 255]
    banner_yellow_lower: [15, 120, 150]
    banner_yellow_upper: [35, 255, 255]
    detection_threshold: 0.08  # Min banner color ratio to confirm safe zone

# Model architecture
model:
  type: "hybrid"  # "mlp" or "hybrid"
  hidden_layers: [128, 64]  # MLP head layer sizes
  dropout: 0.1
  activation: "relu"
  cnn_output_dim: 32  # Spatial CNN output features
  max_parameters: 500000  # Keep under 500K for Iris Xe

# Behavior Cloning training
behavior_cloning:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"
  loss_function: "cross_entropy"
  early_stopping_patience: 10
  validation_split: 0.2

# Reinforcement Learning training
reinforcement_learning:
  algorithm: "PPO"  # PPO or DQN (PPO recommended for continuous actions)
  episodes: 1000
  steps_per_episode: 500
  gamma: 0.99  # Discount factor
  learning_rate: 0.0003
  clip_range: 0.2
  entropy_coef: 0.01
  
# Rewards configuration
rewards:
  damage_dealt: 1.0
  damage_taken: -0.5
  kill: 5.0
  death: -2.0
  distance_to_enemy: -0.01  # Reward for getting closer
  successful_hit: 2.0
  missed_hit: -0.5

# Action space
actions:
  keyboard_keys: ["W", "A", "S", "D", "SPACE", "SHIFT"]
  mouse_buttons: ["left", "right"]
  mouse_sensitivity: 0.5  # Lower = smoother movements
  action_repeat: 1  # Repeat action for N frames
  
# Human-like behavior
humanization:
  enable_reaction_delay: true
  min_reaction_time_ms: 150  # Minimum human reaction time
  max_reaction_time_ms: 350  # Maximum human reaction time
  jitter_std: 0.05  # Random noise added to movements
  action_randomness: 0.02  # Small random variations in timing

# Inference settings
inference:
  fps_limit: 60  # Match game FPS
  confidence_threshold: 0.0  # LOWERED TO 0.0 - ALWAYS take the most likely action
  smoothing_window: 3  # Frame averaging for smoother movements
  safety_mode: true  # Enable anti-detection features

# Data collection
data_collection:
  save_directory: "./data/recordings"
  session_duration_seconds: 1800  # 30 minutes per session
  save_format: "npz"  # numpy compressed format
  compress: true

# Logging and monitoring
logging:
  level: "INFO"
  save_logs: true
  log_directory: "./logs"
  tensorboard: true
  checkpoint_frequency: 5  # Save model every N epochs

# Paths
paths:
  data_dir: "./data"
  model_dir: "./checkpoints"
  config_dir: "./configs"
  log_dir: "./logs"
